<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- MemoryForge brand icon: neural memory node -->
  <!-- Central node -->
  <circle cx="32" cy="32" r="9" fill="#6366f1" opacity="0.95"/>
  <!-- Inner highlight -->
  <circle cx="32" cy="32" r="5" fill="#818cf8" opacity="0.6"/>

  <!-- Outer ring (memory orbit) -->
  <circle cx="32" cy="32" r="22" stroke="#6366f1" stroke-width="1.5" opacity="0.35"/>

  <!-- Satellite nodes -->
  <circle cx="32" cy="10" r="4" fill="#6366f1" opacity="0.8"/>
  <circle cx="32" cy="54" r="4" fill="#6366f1" opacity="0.8"/>
  <circle cx="10" cy="32" r="4" fill="#6366f1" opacity="0.8"/>
  <circle cx="54" cy="32" r="4" fill="#6366f1" opacity="0.8"/>

  <!-- Diagonal satellite nodes -->
  <circle cx="47.6" cy="16.4" r="3" fill="#818cf8" opacity="0.7"/>
  <circle cx="16.4" cy="47.6" r="3" fill="#818cf8" opacity="0.7"/>
  <circle cx="16.4" cy="16.4" r="3" fill="#818cf8" opacity="0.7"/>
  <circle cx="47.6" cy="47.6" r="3" fill="#818cf8" opacity="0.7"/>

  <!-- Connection lines: cardinal -->
  <line x1="32" y1="23" x2="32" y2="14" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <line x1="32" y1="41" x2="32" y2="50" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <line x1="23" y1="32" x2="14" y2="32" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <line x1="41" y1="32" x2="50" y2="32" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>

  <!-- Connection lines: diagonal -->
  <line x1="38.4" y1="25.6" x2="44.6" y2="19.4" stroke="#818cf8" stroke-width="1" opacity="0.5"/>
  <line x1="25.6" y1="38.4" x2="19.4" y2="44.6" stroke="#818cf8" stroke-width="1" opacity="0.5"/>
  <line x1="25.6" y1="25.6" x2="19.4" y2="19.4" stroke="#818cf8" stroke-width="1" opacity="0.5"/>
  <line x1="38.4" y1="38.4" x2="44.6" y2="44.6" stroke="#818cf8" stroke-width="1" opacity="0.5"/>
</svg>
