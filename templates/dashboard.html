<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tmemory - 记忆管理面板</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --surface: #161b22;
  --surface2: #1c2333;
  --border: #2d333b;
  --text: #e6edf3;
  --text2: #8b949e;
  --accent: #58a6ff;
  --accent2: #3fb950;
  --warn: #d29922;
  --danger: #f85149;
  --radius: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,.4);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* ── Layout ─────────────────────────────────────────── */
.app { display:flex; flex-direction:column; height:100vh; }
.header { display:flex; align-items:center; justify-content:space-between; padding:12px 24px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
.header h1 { font-size:18px; font-weight:600; display:flex; align-items:center; gap:8px; }
.header h1 span { font-size:22px; }
.header-right { display:flex; align-items:center; gap:12px; }

.main { display:flex; flex:1; overflow:hidden; }
.sidebar { width:280px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
.content { flex:1; display:flex; flex-direction:column; overflow:hidden; }

/* ── Sidebar ────────────────────────────────────────── */
.sidebar-section { padding:16px; border-bottom:1px solid var(--border); }
.sidebar-section h3 { font-size:12px; text-transform:uppercase; color:var(--text2); letter-spacing:1px; margin-bottom:10px; }
.user-list { list-style:none; max-height:240px; overflow-y:auto; }
.user-list li { padding:8px 12px; border-radius:var(--radius); cursor:pointer; font-size:13px; display:flex; justify-content:space-between; align-items:center; transition:background .15s; }
.user-list li:hover { background:var(--surface2); }
.user-list li.active { background:var(--accent); color:#fff; }
.user-list li .badge { font-size:11px; background:var(--surface2); padding:2px 7px; border-radius:10px; color:var(--text2); }
.user-list li.active .badge { background:rgba(255,255,255,.2); color:#fff; }

.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.stat-card { background:var(--surface2); border-radius:var(--radius); padding:10px 12px; }
.stat-card .label { font-size:11px; color:var(--text2); }
.stat-card .value { font-size:20px; font-weight:700; margin-top:2px; }

.search-box { width:100%; padding:8px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:13px; outline:none; }
.search-box:focus { border-color:var(--accent); }

/* ── Tabs ───────────────────────────────────────────── */
.tab-bar { display:flex; gap:0; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; }
.tab-bar button { padding:10px 20px; background:none; border:none; color:var(--text2); font-size:13px; cursor:pointer; border-bottom:2px solid transparent; transition:all .15s; }
.tab-bar button:hover { color:var(--text); background:var(--surface2); }
.tab-bar button.active { color:var(--accent); border-bottom-color:var(--accent); }

/* ── Mindmap ────────────────────────────────────────── */
.mindmap-container { flex:1; position:relative; overflow:hidden; background:var(--bg); }
.mindmap-container svg { width:100%; height:100%; }
.mindmap-container svg .link { fill:none; stroke:var(--border); stroke-width:1.5px; }
.mindmap-container svg .node circle { cursor:pointer; stroke-width:2px; transition:all .2s; }
.mindmap-container svg .node circle:hover { filter:brightness(1.3); }
.mindmap-container svg .node text { font-size:12px; fill:var(--text); pointer-events:none; }
.mindmap-container svg .node .type-label { font-size:10px; fill:var(--text2); }

.mindmap-legend { position:absolute; bottom:16px; left:16px; display:flex; gap:12px; background:var(--surface); padding:8px 14px; border-radius:var(--radius); border:1px solid var(--border); font-size:11px; }
.mindmap-legend .dot { width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:4px; vertical-align:middle; }

.mindmap-toolbar { position:absolute; top:16px; right:16px; display:flex; gap:6px; }

/* ── Memory Table ───────────────────────────────────── */
.table-panel { flex:1; overflow:auto; padding:16px 20px; }
.mem-table { width:100%; border-collapse:collapse; font-size:13px; }
.mem-table th { text-align:left; padding:8px 10px; color:var(--text2); font-weight:500; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg); }
.mem-table td { padding:8px 10px; border-bottom:1px solid var(--border); vertical-align:top; }
.mem-table tr:hover td { background:var(--surface2); }
.mem-table .type-badge { font-size:11px; padding:2px 8px; border-radius:10px; font-weight:500; }
.type-preference { background:#1f3a5f; color:#79c0ff; }
.type-fact { background:#1a3a2a; color:#56d364; }
.type-task { background:#3d2e00; color:#e3b341; }
.type-restriction { background:#3d1f20; color:#f85149; }
.type-style { background:#2d1f3d; color:#bc8cff; }

.score-bar { width:50px; height:6px; background:var(--surface2); border-radius:3px; display:inline-block; vertical-align:middle; overflow:hidden; }
.score-bar-fill { height:100%; border-radius:3px; }

/* ── Buttons ────────────────────────────────────────── */
.btn { padding:6px 14px; border:1px solid var(--border); border-radius:var(--radius); background:var(--surface2); color:var(--text); font-size:12px; cursor:pointer; transition:all .15s; display:inline-flex; align-items:center; gap:4px; }
.btn:hover { background:var(--border); }
.btn-primary { background:var(--accent); border-color:var(--accent); color:#fff; }
.btn-primary:hover { opacity:.85; }
.btn-danger { color:var(--danger); }
.btn-danger:hover { background:rgba(248,81,73,.15); }
.btn-sm { padding:4px 10px; font-size:11px; }
.btn-icon { width:28px; height:28px; padding:0; display:flex; align-items:center; justify-content:center; }

/* ── Modal ──────────────────────────────────────────── */
.modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; z-index:1000; }
.modal-backdrop.show { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:12px; width:480px; max-width:90vw; max-height:80vh; overflow:auto; box-shadow:var(--shadow); }
.modal-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.modal-header h3 { font-size:15px; }
.modal-body { padding:20px; }
.modal-footer { padding:12px 20px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; }

.form-group { margin-bottom:14px; }
.form-group label { display:block; font-size:12px; color:var(--text2); margin-bottom:4px; }
.form-group input, .form-group select, .form-group textarea { width:100%; padding:8px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:13px; outline:none; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--accent); }
.form-group textarea { resize:vertical; min-height:60px; }

/* ── Toast ──────────────────────────────────────────── */
.toast-container { position:fixed; top:20px; right:20px; z-index:2000; display:flex; flex-direction:column; gap:8px; }
.toast { padding:10px 16px; border-radius:var(--radius); font-size:13px; background:var(--surface); border:1px solid var(--border); box-shadow:var(--shadow); animation:slideIn .25s ease; }
.toast-success { border-left:3px solid var(--accent2); }
.toast-error { border-left:3px solid var(--danger); }
@keyframes slideIn { from { opacity:0; transform:translateX(30px); } to { opacity:1; transform:translateX(0); } }

/* ── Empty state ────────────────────────────────────── */
.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text2); gap:8px; }
.empty-state .icon { font-size:48px; opacity:.4; }

/* ── Scrollbar ──────────────────────────────────────── */
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

/* ── Login ─────────────────────────────────────────── */
.login-overlay { position:fixed; inset:0; background:var(--bg); z-index:5000; display:flex; align-items:center; justify-content:center; }
.login-overlay.hidden { display:none; }
.login-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:40px 36px; width:360px; box-shadow:var(--shadow); text-align:center; }
.login-card h2 { font-size:20px; margin-bottom:6px; display:flex; align-items:center; justify-content:center; gap:8px; }
.login-card .subtitle { font-size:13px; color:var(--text2); margin-bottom:24px; }
.login-card .form-group { text-align:left; }
.login-card .login-error { color:var(--danger); font-size:12px; margin-top:8px; min-height:16px; }
.login-card .btn-primary { width:100%; padding:10px; font-size:14px; margin-top:4px; }
</style>
</head>
<body>

<!-- Login Overlay -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <h2><span>🧠</span> tmemory</h2>
    <div class="subtitle">记忆管理面板</div>
    <div class="form-group"><label>用户名</label><input id="loginUser" type="text" placeholder="admin" autocomplete="username"></div>
    <div class="form-group"><label>密码</label><input id="loginPass" type="password" placeholder="请输入密码" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="login-error" id="loginError"></div>
    <button class="btn btn-primary" onclick="doLogin()">登 录</button>
  </div>
</div>

<div class="app" id="mainApp" style="display:none">
  <!-- Header -->
  <div class="header">
    <h1><span>🧠</span> tmemory 记忆管理</h1>
    <div class="header-right">
      <button class="btn btn-sm" onclick="refreshAll()">🔄 刷新</button>
      <button class="btn btn-sm btn-primary" onclick="openDistillModal()">⚡ 立即蒸馏</button>
      <button class="btn btn-sm btn-danger" onclick="logout()">🚪 登出</button>
    </div>
  </div>

  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-section">
        <h3>搜索用户</h3>
        <input class="search-box" placeholder="输入用户 ID…" oninput="filterUsers(this.value)">
      </div>
      <div class="sidebar-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
        <h3>用户列表</h3>
        <ul class="user-list" id="userList"></ul>
      </div>
      <div class="sidebar-section">
        <h3>全局统计</h3>
        <div class="stats-grid">
          <div class="stat-card"><div class="label">活跃记忆</div><div class="value" id="statActive">-</div></div>
          <div class="stat-card"><div class="label">已失效</div><div class="value" id="statDeactivated">-</div></div>
          <div class="stat-card"><div class="label">待蒸馏消息</div><div class="value" id="statPending">-</div></div>
          <div class="stat-card"><div class="label">待蒸馏用户</div><div class="value" id="statPendingUsers">-</div></div>
        </div>
      </div>
    </div>

    <!-- Content -->
    <div class="content">
      <div class="tab-bar">
        <button class="active" onclick="switchTab('mindmap',this)">🗺️ 思维导图</button>
        <button onclick="switchTab('table',this)">📋 记忆列表</button>
        <button onclick="switchTab('pending',this)">⏳ 待蒸馏队列</button>
        <button onclick="switchTab('events',this)">📜 审计日志</button>
      </div>

      <!-- Mindmap View -->
      <div class="mindmap-container" id="panelMindmap">
        <svg id="mindmapSvg"></svg>
        <div class="mindmap-legend">
          <span><span class="dot" style="background:#58a6ff"></span>preference</span>
          <span><span class="dot" style="background:#3fb950"></span>fact</span>
          <span><span class="dot" style="background:#d29922"></span>task</span>
          <span><span class="dot" style="background:#f85149"></span>restriction</span>
          <span><span class="dot" style="background:#bc8cff"></span>style</span>
        </div>
        <div class="mindmap-toolbar">
          <button class="btn btn-icon btn-sm" onclick="zoomIn()" title="放大">+</button>
          <button class="btn btn-icon btn-sm" onclick="zoomOut()" title="缩小">−</button>
          <button class="btn btn-icon btn-sm" onclick="resetZoom()" title="重置">⟲</button>
        </div>
      </div>

      <!-- Table View -->
      <div class="table-panel" id="panelTable" style="display:none">
        <div style="margin-bottom:12px;display:flex;gap:8px;align-items:center;">
          <input class="search-box" style="max-width:260px" placeholder="搜索记忆内容…" oninput="filterMemories(this.value)">
          <button class="btn btn-sm btn-primary" onclick="openAddMemoryModal()">+ 手动添加</button>
        </div>
        <table class="mem-table">
          <thead>
            <tr>
              <th style="width:40px">ID</th>
              <th style="width:80px">类型</th>
              <th>记忆内容</th>
              <th style="width:60px">分数</th>
              <th style="width:60px">重要度</th>
              <th style="width:60px">置信度</th>
              <th style="width:45px">强化</th>
              <th style="width:100px">操作</th>
            </tr>
          </thead>
          <tbody id="memoryTableBody"></tbody>
        </table>
      </div>

      <!-- Pending View -->
      <div class="table-panel" id="panelPending" style="display:none">
        <table class="mem-table">
          <thead><tr><th>用户</th><th style="width:80px">待蒸馏条数</th><th style="width:140px">最早消息</th><th style="width:140px">最新消息</th></tr></thead>
          <tbody id="pendingTableBody"></tbody>
        </table>
      </div>

      <!-- Events View -->
      <div class="table-panel" id="panelEvents" style="display:none">
        <table class="mem-table">
          <thead><tr><th style="width:40px">ID</th><th style="width:80px">时间</th><th style="width:100px">事件类型</th><th>详情</th></tr></thead>
          <tbody id="eventsTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-backdrop" id="editModal">
  <div class="modal">
    <div class="modal-header"><h3 id="editModalTitle">编辑记忆</h3><button class="btn btn-icon btn-sm" onclick="closeModal('editModal')">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-group"><label>记忆内容</label><textarea id="editMemory" rows="3"></textarea></div>
      <div class="form-group"><label>类型</label>
        <select id="editType"><option value="preference">preference</option><option value="fact">fact</option><option value="task">task</option><option value="restriction">restriction</option><option value="style">style</option></select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
        <div class="form-group"><label>分数</label><input id="editScore" type="number" step="0.01" min="0" max="1"></div>
        <div class="form-group"><label>重要度</label><input id="editImportance" type="number" step="0.01" min="0" max="1"></div>
        <div class="form-group"><label>置信度</label><input id="editConfidence" type="number" step="0.01" min="0" max="1"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('editModal')">取消</button>
      <button class="btn btn-primary" onclick="saveMemory()">保存</button>
    </div>
  </div>
</div>

<!-- Distill Modal -->
<div class="modal-backdrop" id="distillModal">
  <div class="modal" style="width:360px">
    <div class="modal-header"><h3>手动蒸馏</h3><button class="btn btn-icon btn-sm" onclick="closeModal('distillModal')">✕</button></div>
    <div class="modal-body"><p style="font-size:13px;color:var(--text2)">立即对所有满足条件的用户触发一次批量蒸馏。</p></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('distillModal')">取消</button>
      <button class="btn btn-primary" onclick="triggerDistill()">确认蒸馏</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const API_BASE = window.location.origin + '/api';

let currentUser = null;
let allUsers = [];
let allMemories = [];
let memoryFilter = '';

// ── Auth ────────────────────────────────────────────────────────────────────
function getToken() { return localStorage.getItem('tmemory_token') || ''; }
function setToken(t) { localStorage.setItem('tmemory_token', t); }
function clearToken() { localStorage.removeItem('tmemory_token'); }
function getAuthHeaders() {
  const token = getToken();
  return token ? { 'Authorization': `Bearer ${token}` } : {};
}

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  if (!username || !password) { errEl.textContent = '请输入用户名和密码'; return; }
  try {
    const resp = await fetch(API_BASE + '/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await resp.json();
    if (data.token) { setToken(data.token); showApp(); }
    else { errEl.textContent = data.error || '登录失败'; }
  } catch (e) { errEl.textContent = '连接失败: ' + e.message; }
}

function logout() {
  clearToken();
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginOverlay').classList.remove('hidden');
}

function showApp() {
  document.getElementById('loginOverlay').classList.add('hidden');
  document.getElementById('mainApp').style.display = '';
  refreshAll();
}

// ── API ─────────────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const url = API_BASE + path;
  try {
    const resp = await fetch(url, {
      headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
      ...opts
    });
    if (resp.status === 401) { logout(); toast('登录已过期', 'error'); return null; }
    return await resp.json();
  } catch (e) {
    console.error('API error:', e);
    toast('请求失败: ' + e.message, 'error');
    return null;
  }
}

// ── Data loading ────────────────────────────────────────────────────────────
async function refreshAll() {
  await Promise.all([loadUsers(), loadStats()]);
  if (currentUser) await loadUserData(currentUser);
}

async function loadUsers() {
  const data = await api('/users');
  if (!data) return;
  allUsers = data.users || [];
  renderUserList(allUsers);
  if (!currentUser && allUsers.length > 0) selectUser(allUsers[0].id);
}

async function loadStats() {
  const data = await api('/stats');
  if (!data) return;
  document.getElementById('statActive').textContent = data.total_active_memories ?? '-';
  document.getElementById('statDeactivated').textContent = data.total_deactivated_memories ?? '-';
  document.getElementById('statPending').textContent = data.pending_cached_rows ?? '-';
  document.getElementById('statPendingUsers').textContent = data.pending_users ?? '-';
}

async function loadUserData(userId) {
  currentUser = userId;
  const [memData, evtData] = await Promise.all([
    api('/memories?user=' + encodeURIComponent(userId)),
    api('/events?user=' + encodeURIComponent(userId))
  ]);
  allMemories = memData?.memories || [];
  renderMemoryTable(allMemories);
  renderMindmap(allMemories, userId);
  renderEvents(evtData?.events || []);
}

// ── User list ───────────────────────────────────────────────────────────────
function renderUserList(users) {
  const ul = document.getElementById('userList');
  if (users.length === 0) {
    ul.innerHTML = '<li style="color:var(--text2);justify-content:center">暂无用户数据</li>';
    return;
  }
  ul.innerHTML = users.map(u => {
    const active = u.id === currentUser;
    const memBadge = u.memory_count > 0 ? `<span class="badge">${u.memory_count}</span>` : '';
    const pendBadge = u.pending_count > 0 ? `<span class="badge" style="background:#3d2e00;color:#e3b341">${u.pending_count}⏳</span>` : '';
    return `<li class="${active ? 'active' : ''}" onclick="selectUser('${u.id.replace(/'/g, "\\'")}')">
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px" title="${escHtml(u.id)}">${escHtml(u.id)}</span>
      <span style="display:flex;gap:4px">${memBadge}${pendBadge}</span>
    </li>`;
  }).join('');
}

function filterUsers(q) {
  const filtered = allUsers.filter(u => u.id.toLowerCase().includes(q.toLowerCase()));
  renderUserList(filtered);
}

function selectUser(userId) {
  currentUser = userId;
  renderUserList(allUsers);
  loadUserData(userId);
}

// ── Tab switching ───────────────────────────────────────────────────────────
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['panelMindmap','panelTable','panelPending','panelEvents'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  const panelMap = { mindmap:'panelMindmap', table:'panelTable', pending:'panelPending', events:'panelEvents' };
  document.getElementById(panelMap[tab]).style.display = '';
  if (tab === 'mindmap') requestAnimationFrame(() => renderMindmap(allMemories, currentUser));
  if (tab === 'pending') loadPendingQueue();
}

// ── Pending queue ───────────────────────────────────────────────────────────
async function loadPendingQueue() {
  const data = await api('/pending');
  const tbody = document.getElementById('pendingTableBody');
  if (!data || !data.pending || data.pending.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text2);padding:40px">当前没有待蒸馏消息</td></tr>';
    return;
  }
  tbody.innerHTML = data.pending.map(p => `
    <tr>
      <td style="cursor:pointer;color:var(--accent)" onclick="selectUser('${p.user.replace(/'/g, "\\'")}')">${escHtml(p.user)}</td>
      <td style="text-align:center"><span class="badge" style="background:#3d2e00;color:#e3b341">${p.count}</span></td>
      <td style="font-size:12px;color:var(--text2)">${p.oldest}</td>
      <td style="font-size:12px;color:var(--text2)">${p.newest}</td>
    </tr>
  `).join('');
}

// ── Memory table ────────────────────────────────────────────────────────────
function filterMemories(q) { memoryFilter = q.toLowerCase(); renderMemoryTable(allMemories); }

function renderMemoryTable(memories) {
  const filtered = memoryFilter ? memories.filter(m => m.memory.toLowerCase().includes(memoryFilter)) : memories;
  const tbody = document.getElementById('memoryTableBody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text2);padding:40px">暂无记忆</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(m => `
    <tr>
      <td>${m.id}</td>
      <td><span class="type-badge type-${m.memory_type}">${m.memory_type}</span></td>
      <td style="max-width:300px;word-break:break-all">${escHtml(m.memory)}</td>
      <td>${scoreBar(m.score)}</td>
      <td>${scoreBar(m.importance)}</td>
      <td>${scoreBar(m.confidence)}</td>
      <td style="text-align:center">${m.reinforce_count}</td>
      <td>
        <button class="btn btn-sm" onclick='openEditModal(${JSON.stringify(m)})'>✏️</button>
        <button class="btn btn-sm btn-danger" onclick="deleteMemory(${m.id})">🗑️</button>
      </td>
    </tr>
  `).join('');
}

function scoreBar(val) {
  const v = Math.round((val || 0) * 100);
  const color = v >= 70 ? 'var(--accent2)' : v >= 40 ? 'var(--warn)' : 'var(--danger)';
  return `<div class="score-bar"><div class="score-bar-fill" style="width:${v}%;background:${color}"></div></div> ${(val||0).toFixed(2)}`;
}

// ── Events table ────────────────────────────────────────────────────────────
function renderEvents(events) {
  const tbody = document.getElementById('eventsTableBody');
  if (events.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text2);padding:40px">暂无事件</td></tr>';
    return;
  }
  tbody.innerHTML = events.map(e => `
    <tr>
      <td>${e.id}</td>
      <td style="font-size:12px;color:var(--text2)">${e.created_at}</td>
      <td><span class="type-badge type-${e.event_type === 'delete' ? 'restriction' : e.event_type === 'merge' ? 'task' : 'fact'}">${e.event_type}</span></td>
      <td style="font-size:12px;max-width:400px;word-break:break-all">${escHtml(e.payload_json)}</td>
    </tr>
  `).join('');
}

// ── Mindmap ─────────────────────────────────────────────────────────────────
const TYPE_COLORS = { preference:'#58a6ff', fact:'#3fb950', task:'#d29922', restriction:'#f85149', style:'#bc8cff' };
let svgZoom, svgG;

function renderMindmap(memories, userId) {
  const svg = d3.select('#mindmapSvg');
  svg.selectAll('*').remove();
  const container = document.getElementById('panelMindmap');
  const W = container.clientWidth || 800;
  const H = container.clientHeight || 500;
  svg.attr('viewBox', `0 0 ${W} ${H}`);

  if (!memories || memories.length === 0) {
    svg.append('text').attr('x', W/2).attr('y', H/2).attr('text-anchor','middle')
      .attr('fill', 'var(--text2)').attr('font-size', 14).text('选择一个用户以查看记忆导图');
    return;
  }

  const grouped = {};
  memories.forEach(m => {
    const t = m.memory_type || 'fact';
    if (!grouped[t]) grouped[t] = [];
    grouped[t].push(m);
  });

  const root = {
    name: userId || '用户',
    children: Object.entries(grouped).map(([type, items]) => ({
      name: type, type,
      children: items.map(m => ({
        name: m.memory.length > 30 ? m.memory.slice(0, 30) + '…' : m.memory,
        fullText: m.memory, type, memData: m, importance: m.importance || 0.5
      }))
    }))
  };

  const hierarchy = d3.hierarchy(root);
  d3.tree().size([H - 80, W - 260])(hierarchy);
  svgG = svg.append('g').attr('transform', 'translate(80, 40)');
  svgZoom = d3.zoom().scaleExtent([0.3, 3]).on('zoom', e => svgG.attr('transform', e.transform));
  svg.call(svgZoom).call(svgZoom.transform, d3.zoomIdentity.translate(80, 40));

  svgG.selectAll('.link').data(hierarchy.links()).join('path').attr('class','link')
    .attr('d', d3.linkHorizontal().x(d => d.y).y(d => d.x))
    .attr('stroke', d => TYPE_COLORS[d.target.data.type] || 'var(--border)').attr('stroke-opacity', 0.4);

  const nodes = svgG.selectAll('.node').data(hierarchy.descendants()).join('g').attr('class','node')
    .attr('transform', d => `translate(${d.y},${d.x})`);
  nodes.append('circle')
    .attr('r', d => d.depth === 0 ? 14 : d.depth === 1 ? 10 : 5 + (d.data.importance || 0.5) * 6)
    .attr('fill', d => d.depth === 0 ? 'var(--accent)' : TYPE_COLORS[d.data.type] || '#666')
    .attr('stroke', d => d.depth === 0 ? '#fff' : TYPE_COLORS[d.data.type] || '#666')
    .attr('fill-opacity', d => d.depth === 2 ? 0.7 : 1)
    .on('click', (e, d) => { if (d.data.memData) openEditModal(d.data.memData); })
    .append('title').text(d => d.data.fullText || d.data.name);
  nodes.append('text')
    .attr('dy', d => d.depth === 0 ? -20 : d.children ? -16 : 4)
    .attr('x', d => d.children ? 0 : 12)
    .attr('text-anchor', d => d.children ? 'middle' : 'start')
    .attr('font-weight', d => d.depth <= 1 ? 600 : 400)
    .attr('font-size', d => d.depth === 0 ? 14 : d.depth === 1 ? 13 : 11)
    .text(d => d.data.name);
}

function zoomIn() { d3.select('#mindmapSvg').transition().duration(300).call(svgZoom.scaleBy, 1.3); }
function zoomOut() { d3.select('#mindmapSvg').transition().duration(300).call(svgZoom.scaleBy, 0.7); }
function resetZoom() { d3.select('#mindmapSvg').transition().duration(300).call(svgZoom.transform, d3.zoomIdentity.translate(80, 40)); }

// ── CRUD ────────────────────────────────────────────────────────────────────
function openEditModal(m) {
  document.getElementById('editModalTitle').textContent = m.id ? '编辑记忆 #' + m.id : '添加记忆';
  document.getElementById('editId').value = m.id || '';
  document.getElementById('editMemory').value = m.memory || '';
  document.getElementById('editType').value = m.memory_type || 'fact';
  document.getElementById('editScore').value = m.score ?? 0.7;
  document.getElementById('editImportance').value = m.importance ?? 0.6;
  document.getElementById('editConfidence').value = m.confidence ?? 0.7;
  document.getElementById('editModal').classList.add('show');
}

function openAddMemoryModal() {
  openEditModal({ id: '', memory: '', memory_type: 'fact', score: 0.7, importance: 0.6, confidence: 0.7 });
  document.getElementById('editModalTitle').textContent = '添加新记忆';
}

async function saveMemory() {
  const id = document.getElementById('editId').value;
  const body = {
    user: currentUser,
    memory: document.getElementById('editMemory').value,
    memory_type: document.getElementById('editType').value,
    score: parseFloat(document.getElementById('editScore').value) || 0.7,
    importance: parseFloat(document.getElementById('editImportance').value) || 0.6,
    confidence: parseFloat(document.getElementById('editConfidence').value) || 0.7,
  };
  if (id) body.id = parseInt(id);
  const endpoint = id ? '/memory/update' : '/memory/add';
  const res = await api(endpoint, { method: 'POST', body: JSON.stringify(body) });
  if (res && !res.error) {
    toast(id ? '记忆已更新' : '记忆已添加', 'success');
    closeModal('editModal');
    loadUserData(currentUser);
  } else {
    toast('操作失败: ' + (res?.error || 'unknown'), 'error');
  }
}

async function deleteMemory(id) {
  if (!confirm(`确认删除记忆 #${id}？`)) return;
  const res = await api('/memory/delete', { method: 'POST', body: JSON.stringify({ id }) });
  if (res && !res.error) { toast('记忆已删除', 'success'); loadUserData(currentUser); loadStats(); }
  else { toast('删除失败', 'error'); }
}

async function triggerDistill() {
  closeModal('distillModal');
  toast('正在蒸馏，请稍候…', 'success');
  const res = await api('/distill', { method: 'POST' });
  if (res && res.ok) {
    if (res.processed_users === 0 && res.total_memories === 0) {
      toast('蒸馏完成：没有需要处理的数据（可能缓存为空或 LLM 不可用）', 'error');
    } else {
      toast(`蒸馏完成：${res.processed_users} 个用户，${res.total_memories} 条记忆`, 'success');
    }
    await refreshAll();
  } else {
    toast('蒸馏失败: ' + (res?.error || 'unknown'), 'error');
  }
}

function openDistillModal() { document.getElementById('distillModal').classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

// ── Helpers ─────────────────────────────────────────────────────────────────
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function toast(msg, type = 'success') {
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 4000);
}

// ── Init ────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  if (getToken()) {
    fetch(API_BASE + '/stats', { headers: getAuthHeaders() })
      .then(r => { if (r.ok) showApp(); else logout(); })
      .catch(() => logout());
  }
});
document.querySelectorAll('.modal-backdrop').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('show'); });
});
</script>
