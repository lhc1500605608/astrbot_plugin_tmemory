services:
  # ── 本地 LLM 服务（OpenAI 兼容 API） ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: astrbot-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"  # Ollama API (供 E2E 验证脚本从宿主机访问)
    healthcheck:
      test: ["CMD-SHELL", "/usr/bin/ollama list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - astrbot-network

  astrbot:
    image: soulter/astrbot:nightly-latest
    container_name: astrbot_tmemory_test
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "6186:6185"   # AstrBot WebUI (host 6186 → container 6185, 避免与本地 6185 冲突)
      - "9966:9966"   # tmemory WebUI (when webui_enabled=true)
    volumes:
      - ./data:/AstrBot/data
      - .:/AstrBot/data/plugins/astrbot_plugin_tmemory
      - ./docker:/docker:ro   # 初始化脚本（只读挂载）
    entrypoint: ["/bin/bash", "/docker/astrbot_init.sh"]
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_CHAT_MODEL=qwen2.5:0.5b
      - OLLAMA_EMBED_MODEL=nomic-embed-text
      - TZ=Asia/Shanghai
    networks:
      - astrbot-network

volumes:
  ollama-data:
    external: false

networks:
  astrbot-network:
    driver: bridge
