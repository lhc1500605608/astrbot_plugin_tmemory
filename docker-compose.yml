services:
  astrbot:
    image: soulter/astrbot:nightly-latest
    container_name: astrbot_tmemory_test
    restart: unless-stopped
    ports:
      - "6186:6185"   # AstrBot WebUI (host 6186 → container 6185, 避免与本地 6185 冲突)
      - "9966:9966"   # tmemory WebUI (when webui_enabled=true)
    volumes:
      - ./data:/AstrBot/data
      - .:/AstrBot/data/plugins/astrbot_plugin_tmemory
      - ./docker:/docker:ro   # 初始化脚本（只读挂载）
    entrypoint: ["/bin/bash", "/docker/astrbot_init.sh"]
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:?DEEPSEEK_API_KEY is required}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-v4-flash}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - TZ=${TZ:-Asia/Shanghai}
